when:
  event: push
  path: 'front/**/*'

variables:
  - &file front/Dockerfile
  - &repo ghcr.io/${CI_REPO}-front
  - &cache_registry ghcr.io/${CI_REPO_OWNER}/cache

steps:
  publish:
    image: docker.io/woodpeckerci/plugin-docker-buildx:latest
    settings:
      dockerfile: *file
      context: front
      repo: *repo
      registry: ghcr.io
      tags: latest
      platforms: linux/arm64/v8
      username: ${CI_REPO_OWNER}
      password:
        from_secret: gh_token
      cache_from: *cache_registry:tykar-frontend-layers
      cache_to: type=registry,ref=*cache_registry:tykar-frontend-layers,mode=max
