when:
  event: push

variables:
  - &front_file front/Dockerfile
  - &front_repo ghcr.io/${CI_REPO}-front
  - &back_file back/Dockerfile
  - &back_repo ghcr.io/${CI_REPO}-back

steps:
  publish-frontend:
    when:
      path: 'front/**/*'
    image: docker.io/woodpeckerci/plugin-docker-buildx:latest
    settings:
      dockerfile: *front_file
      context: front
      repo: *front_repo
      registry: ghcr.io
      tags: latest
      username: ${CI_REPO_OWNER}
      password:
        from_secret: gh_token
      cache_images:
        - ghcr.io/${CI_REPO}-front:cache

  publish-backend:
    when:
      path: 'back/**/*'
    image: docker.io/woodpeckerci/plugin-docker-buildx:latest
    settings:
      dockerfile: *back_file
      context: back
      repo: *back_repo
      registry: ghcr.io
      tags: latest
      username: ${CI_REPO_OWNER}
      password:
        from_secret: gh_token
      cache_images:
        - ghcr.io/${CI_REPO}-back:cache
